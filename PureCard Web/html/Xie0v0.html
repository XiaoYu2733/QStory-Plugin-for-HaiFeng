<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>PureCard 动效版 - 优化动画</title>
<style>
/* 修复SVG图标对齐问题 */
.engine-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.4s var(--ease-out-elastic);
}

.engine-icon svg {
  width: 16px;
  height: 16px;
  display: block;
}

.engine-item .engine-icon {
  width: 14px;
  height: 14px;
}

.engine-item .engine-icon svg {
  width: 14px;
  height: 14px;
}

/* 书签图标样式 - 调整SVG大小 */
.bookmark-icon {
  display: flex;
  align-items: center;
  justify-content: center;
}

.bookmark-icon svg {
  width: 28px;  /* 从24px增加到28px */
  height: 28px; /* 从24px增加到28px */
  display: block;
}

/* 对于使用emoji的书签，保持原有字体大小 */
.bookmark-icon span {
  font-size: 22px; /* 保持原有的emoji大小 */
}

/* 调整搜索引擎按钮的布局 */
.engine-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

/* 原有的所有其他样式保持不变 */
:root {
  --blue: #3E82E6;
  --light-bg: #F7FAFF;
  --border: #E1E8ED;
  --text-dark: #1E293B;
  --text-gray: #475569;
  --radius: 12px;
  --shadow: 0 4px 12px rgba(62,130,230,0.1);
  --transition: all .3s cubic-bezier(0.34, 1.56, 0.64, 1);
  
  /* 专业动画曲线 */
  --bounce: cubic-bezier(0.175, 0.885, 0.32, 1.275);
  --spring: cubic-bezier(0.68, -0.6, 0.32, 1.6);
  --super-bounce: cubic-bezier(0.2, 2, 0.8, 0.5);
  --smooth-in: cubic-bezier(0.25, 0.46, 0.45, 0.94);
  --smooth-out: cubic-bezier(0.55, 0.085, 0.68, 0.53);
  
  /* 新增专业曲线 - Material Design & 专业动画 */
  --ease-out-back: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-in-out-back: cubic-bezier(0.68, -0.55, 0.265, 1.55);
  --ease-out-elastic: cubic-bezier(0.5, 1.5, 0.5, 1);
  --ease-in-out-sine: cubic-bezier(0.45, 0.05, 0.55, 0.95);
  --material-standard: cubic-bezier(0.4, 0.0, 0.2, 1);
  --material-decelerate: cubic-bezier(0.0, 0.0, 0.2, 1);
  --material-accelerate: cubic-bezier(0.4, 0.0, 1, 1);
  --gentle-bounce: cubic-bezier(0.34, 1.3, 0.64, 1);
  --smooth-spring: cubic-bezier(0.25, 0.8, 0.25, 1.2);
}

* { 
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  background: var(--light-bg);
  font-family: -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  margin: 0; padding: 15px;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh; color: var(--text-dark); overflow-x: hidden; width: 100%;
  opacity: 0;
  animation: bodyFadeIn 0.8s var(--gentle-bounce) 0.2s forwards;
}

@keyframes bodyFadeIn {
  0% { opacity: 0; transform: scale(0.98) translateY(10px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}

/* 卡片入场动画 - 优化版本 */
.card {
  width: 100%; max-width: 480px;
  border-radius: var(--radius); border: 1px solid var(--border);
  background: #fff; box-shadow: var(--shadow); 
  margin-bottom: 16px; transform: translateY(0);
  animation: cardSlideUp 0.7s var(--ease-out-back) backwards;
  will-change: transform;
  transition: all 0.4s var(--material-standard);
}
.card:nth-child(1) { animation-delay: 0.1s; }
.card:nth-child(2) { animation-delay: 0.2s; }
.card:nth-child(3) { animation-delay: 0.3s; }

@keyframes cardSlideUp {
  0% { 
    opacity: 0; 
    transform: translateY(40px) scale(0.95); 
  }
  60% { 
    opacity: 1; 
    transform: translateY(-8px) scale(1.01); 
  }
  100% { 
    opacity: 1; 
    transform: translateY(0) scale(1); 
  }
}

/* Header */
.header-card { text-align: center; padding: 20px 16px; }
.main-icon {
  width: 56px; height: 56px; display: flex; align-items: center; justify-content: center;
  margin: 0 auto; font-size: 28px; color: var(--blue); border-radius: 50%;
  background: linear-gradient(135deg, rgba(62,130,230,0.2), rgba(62,130,230,0.05));
  cursor: pointer; 
  position: relative;
  animation: iconHyperspace 3s cubic-bezier(0.2, 2, 0.8, 0.5) infinite;
  transform-style: preserve-3d;
  transition: all 0.4s var(--material-standard);
}
@keyframes iconHyperspace {
  0%, 100% { 
    transform: scale(1) rotate(0) translateZ(0);
    box-shadow: 
      0 0 0 0 rgba(62,130,230,0.6),
      0 0 0 0 rgba(62,130,230,0.4),
      0 0 0 0 rgba(62,130,230,0.2);
  }
  20% { 
    transform: scale(1.15) rotate(10deg) translateZ(20px);
    box-shadow: 
      0 0 0 12px rgba(62,130,230,0),
      0 0 0 24px rgba(62,130,230,0),
      0 0 0 36px rgba(62,130,230,0);
  }
  40% { 
    transform: scale(0.9) rotate(-8deg) translateZ(10px);
  }
  60% { 
    transform: scale(1.1) rotate(5deg) translateZ(15px);
  }
  80% { 
    transform: scale(0.95) rotate(-3deg) translateZ(5px);
  }
}
.main-icon::before {
  content: '';
  position: absolute;
  width: 150%;
  height: 150%;
  border-radius: 50%;
  background: conic-gradient(
    from 0deg,
    transparent, 
    rgba(62,130,230,0.8), 
    rgba(255,255,255,0.9),
    rgba(62,130,230,0.6),
    transparent
  );
  animation: iconWarpSpeed 2s linear infinite;
  z-index: -1;
  filter: blur(5px);
}
@keyframes iconWarpSpeed {
  0% { transform: rotate(0) scale(1); opacity: 0.8; }
  50% { transform: rotate(180deg) scale(1.3); opacity: 0.4; }
  100% { transform: rotate(360deg) scale(1); opacity: 0.8; }
}
.main-icon.interact { 
  animation: iconSuperSpin 0.8s var(--ease-out-elastic) forwards;
}
@keyframes iconSuperSpin {
  0% { 
    transform: rotate(0) scale(1);
  }
  30% { 
    transform: rotate(540deg) scale(1.4);
  }
  60% { 
    transform: rotate(900deg) scale(0.8);
  }
  100% { 
    transform: rotate(1080deg) scale(1);
  }
}
.title { 
  font-size: 20px; font-weight: 700; margin: 12px 0 6px; 
  animation: titlePop 0.8s var(--ease-out-back) 0.4s backwards;
}
@keyframes titlePop {
  0% { opacity: 0; transform: scale(0.8) translateY(10px); }
  70% { transform: scale(1.05) translateY(-2px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}

.quote-content { 
  font-size: 14px; color: var(--text-gray); font-style: italic; 
  opacity: 0; transform: translateY(10px);
  transition: all 0.6s var(--gentle-bounce); 
}
.quote-author { 
  font-size: 12px; color: #6b7280; margin-top: 4px;
  opacity: 0; transform: translateY(5px);
  transition: all 0.6s var(--gentle-bounce) 0.1s;
}

/* 搜索 */
.search-card { padding: 18px 16px; }
.search-container { 
  display: flex; 
  align-items: stretch; 
  gap: 8px; 
  position: relative;
  z-index: 1;
}

/* 搜索引擎按钮 - 优化版本 */
.engine-btn {
  background: #f1f5fb; 
  border: 1px solid var(--border); 
  border-radius: 8px;
  width: 90px; 
  font-size: 13px; 
  color: var(--blue); 
  font-weight: 800;
  text-align: center; 
  cursor: pointer; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  gap: 6px; 
  position: relative; 
  overflow: hidden; 
  padding: 0 8px;
  animation: buttonPop 0.6s var(--ease-out-back) 0.5s backwards;
  transition: all 0.3s var(--material-standard);
  transform-style: preserve-3d;
  will-change: transform;
  box-shadow: 0 2px 6px rgba(62,130,230,0.1);
  z-index: 2;
}

.engine-btn.animate .engine-icon { 
  transform: rotate(360deg) scale(1.2);
}

@keyframes buttonPop {
  0% { opacity: 0; transform: scale(0.8) translateY(10px); }
  70% { transform: scale(1.05) translateY(-2px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}

/* 搜索按钮 - 优化版本 */
.search-btn {
  position: relative; 
  overflow: hidden; 
  background: var(--blue); 
  color: white;
  border: none; 
  border-radius: 8px; 
  padding: 0 16px; 
  font-size: 14px;
  font-weight: 600; 
  display: flex; 
  align-items: center; 
  justify-content: center;
  white-space: nowrap; 
  cursor: pointer;
  animation: buttonPop 0.6s var(--ease-out-back) 0.6s backwards;
  transition: all 0.3s var(--material-standard);
  will-change: transform;
  box-shadow: 0 2px 6px rgba(62,130,230,0.2);
  transform-style: preserve-3d;
  z-index: 2;
}

/* 搜索按钮涟漪效果 - 优化版本 */
.search-btn::after {
  content: ''; 
  position: absolute; 
  border-radius: 50%;
  width: 18px; 
  height: 18px; 
  background: rgba(255,255,255,0.5);
  transform: scale(0); 
  opacity: 0; 
  transition: transform 0.5s var(--ease-out-elastic), opacity 0.8s ease;
}
.search-btn.ripple::after { 
  transform: scale(10); 
  opacity: 0; 
}

.search-input {
  flex: 1; padding: 10px 12px; font-size: 14px;
  border: 1px solid var(--border); border-radius: 8px;
  transition: all .25s var(--material-decelerate); 
  min-width: 0;
  animation: inputSlide 0.6s var(--material-decelerate) 0.4s backwards;
  will-change: transform;
  z-index: 2;
}
@keyframes inputSlide {
  0% { opacity: 0; transform: translateX(-20px) scale(0.95); }
  70% { transform: translateX(5px) scale(1.01); }
  100% { opacity: 1; transform: translateX(0) scale(1); }
}

/* 输入框焦点样式 */
.search-input:focus,
.engine-btn:focus,
.search-btn:focus {
  outline: none; 
  border-color: var(--blue);
  box-shadow: 0 0 0 2px rgba(62, 130, 230, 0.1);
  transform: translateY(-1px);
}

/* 引擎弹出菜单飞出动画 */
@keyframes popupSpringOut {
  0% { 
    opacity: 1; 
    transform: scale(1) translateY(0); 
  }
  40% { 
    opacity: 0.8; 
    transform: scale(1.05) translateY(3px); 
  }
  70% { 
    transform: scale(0.98) translateY(-1px); 
  }
  100% { 
    opacity: 0; 
    transform: scale(0.7) translateY(-10px); 
  }
}

/* 引擎弹出菜单 - 优化版本 */
#enginePopup {
  position: absolute; 
  background: white; 
  border: 1px solid var(--border);
  border-radius: 12px; 
  box-shadow: 0 8px 32px rgba(62,130,230,0.2); 
  display: none; 
  z-index: 100;
  min-width: 130px; 
  overflow: hidden;
  animation: popupSpring 0.4s var(--ease-in-out-back) forwards;
  transform-origin: top left;
  will-change: transform, opacity;
  backdrop-filter: blur(10px);
  background: rgba(255, 255, 255, 0.95);
}

@keyframes popupSpring {
  0% { 
    opacity: 0; 
    transform: scale(0.7) translateY(-10px); 
  }
  40% { 
    opacity: 1; 
    transform: scale(1.05) translateY(3px); 
  }
  70% { 
    transform: scale(0.98) translateY(-1px); 
  }
  100% { 
    opacity: 1; 
    transform: scale(1) translateY(0); 
  }
}

.engine-item { 
  padding: 12px 16px; 
  font-size: 13px; 
  color: var(--text-dark); 
  cursor: pointer; 
  transition: all 0.3s var(--smooth-spring);
  will-change: transform;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid rgba(225,232,237,0.5);
  position: relative;
  overflow: hidden;
}

.engine-item:last-child {
  border-bottom: none;
}

.engine-item::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(62,130,230,0.1), transparent);
  transition: left 0.6s ease;
}

.engine-item:hover::before {
  left: 100%;
}

.engine-item.active { 
  color: var(--blue); 
  font-weight: 600;
  background: rgba(62,130,230,0.08);
  position: relative;
}

.engine-item.active::after {
  content: '';
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 4px;
  height: 4px;
  background: var(--blue);
  border-radius: 50%;
  animation: activePulse 1.5s infinite;
}

@keyframes activePulse {
  0%, 100% { opacity: 1; transform: translateY(-50%) scale(1); }
  50% { opacity: 0.5; transform: translateY(-50%) scale(1.5); }
}

/* 书签 */
.bookmarks-card { padding: 18px 16px; }
.bookmarks-title { 
  font-size: 16px; font-weight: 700; margin-bottom: 14px;
  display: flex; align-items: center; 
  animation: titleSlide 0.6s var(--material-decelerate) 0.7s backwards;
}
@keyframes titleSlide {
  0% { opacity: 0; transform: translateX(-20px); }
  70% { transform: translateX(5px); }
  100% { opacity: 1; transform: translateX(0); }
}
.bookmarks-title::before { 
  content: "📌"; margin-right: 6px; 
  animation: pinWiggle 3s var(--gentle-bounce) infinite;
}
@keyframes pinWiggle {
  0%, 20%, 40%, 60%, 80%, 100% { transform: rotate(0); }
  10%, 30% { transform: rotate(-3deg); }
  50%, 70% { transform: rotate(3deg); }
}

.bookmarks-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
  gap: 12px;
}
.bookmark-item {
  display: flex; flex-direction: column; align-items: center;
  text-decoration: none; transition: all 0.4s var(--material-standard); color: inherit;
  animation: bookmarkBounce 0.6s var(--ease-out-back) backwards;
  will-change: transform;
}
.bookmark-item:nth-child(1) { animation-delay: 0.8s; }
.bookmark-item:nth-child(2) { animation-delay: 0.9s; }
.bookmark-item:nth-child(3) { animation-delay: 1.0s; }
.bookmark-item:nth-child(4) { animation-delay: 1.1s; }
.bookmark-item:nth-child(5) { animation-delay: 1.2s; }
.bookmark-item:nth-child(6) { animation-delay: 1.3s; }

@keyframes bookmarkBounce {
  0% { opacity: 0; transform: scale(0.5) translateY(20px); }
  60% { transform: scale(1.1) translateY(-5px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}

.bookmark-icon {
  width: 52px; height: 52px; display: flex; align-items: center; justify-content: center;
  color: var(--blue); border: 1px solid var(--border);
  background: #f1f5fb; border-radius: 10px;
  transition: all 0.4s var(--smooth-spring);
  will-change: transform;
}
.bookmark-label { 
  font-size: 12px; color: var(--text-gray); margin-top: 6px; text-align: center; 
  transition: all 0.3s var(--material-standard);
  will-change: transform;
}

/* 微交互：书签点击效果 */
.bookmark-item:active .bookmark-icon {
  transform: scale(0.9);
  transition: all 0.1s var(--material-accelerate);
}

.bookmark-item:active .bookmark-label {
  transform: scale(0.95);
  transition: all 0.1s var(--material-accelerate);
}

/* 彩蛋弹窗 - 优化动画曲线 */
.easter-egg-popup {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
  background: rgba(255,255,255,0.98); backdrop-filter: blur(20px);
  border: 1px solid rgba(62,130,230,0.2); border-radius: 20px;
  box-shadow: 0 20px 60px rgba(62,130,230,0.2); 
  padding: 30px 28px; z-index: 1001; opacity: 0; text-align: center;
  animation: modernEggEnter 0.6s var(--ease-in-out-back) forwards;
  max-width: 320px; width: 85%;
  will-change: transform, opacity;
  overflow: hidden;
}

.easter-egg-popup::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, #FF6B9D, #FFB74D, #4FC3F7, #9575CD, #FF6B9D);
  background-size: 200% 100%;
  animation: gradientShift 3s ease infinite;
}

@keyframes modernEggEnter {
  0% { 
    opacity: 0; 
    transform: translate(-50%, -50%) scale(0.8) rotate(-5deg); 
  }
  60% { 
    opacity: 1; 
    transform: translate(-50%, -50%) scale(1.02) rotate(1deg); 
  }
  100% { 
    opacity: 1; 
    transform: translate(-50%, -50%) scale(1) rotate(0); 
  }
}

/* 新增彩蛋弹窗飞出动画 */
@keyframes modernEggExit {
  0% { 
    opacity: 1; 
    transform: translate(-50%, -50%) scale(1) rotate(0); 
  }
  30% { 
    opacity: 0.9; 
    transform: translate(-50%, -50%) scale(1.05) rotate(-3deg); 
  }
  60% { 
    opacity: 0.7; 
    transform: translate(-50%, -50%) scale(0.95) rotate(2deg); 
  }
  100% { 
    opacity: 0; 
    transform: translate(-50%, -50%) scale(0.8) rotate(-5deg) translateY(40px); 
  }
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.easter-egg-header {
  margin-bottom: 20px;
  position: relative;
}

.easter-egg-icon {
  font-size: 48px; margin-bottom: 16px; 
  animation: float 3s var(--gentle-bounce) infinite;
  display: inline-block;
  filter: drop-shadow(0 4px 8px rgba(62,130,230,0.3));
}

@keyframes float {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-8px) scale(1.05); }
}

.easter-egg-title {
  font-size: 18px; font-weight: 700; color: var(--text-dark);
  margin-bottom: 8px;
}

.easter-egg-content {
  font-size: 14px; color: var(--text-gray); line-height: 1.6;
  margin-bottom: 24px;
}

.easter-egg-btn {
  background: var(--blue); color: white; border: none; border-radius: 10px;
  padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer;
  transition: all 0.3s var(--material-standard);
  animation: buttonPop 0.6s var(--ease-out-back) 0.3s backwards;
  will-change: transform;
  position: relative;
  overflow: hidden;
  display: inline-block;
  min-width: 120px;
}

.easter-egg-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.5s ease;
}

.easter-egg-btn:hover::before {
  left: 100%;
}

.easter-egg-btn:active {
  transform: scale(0.95);
  transition: all 0.1s var(--material-accelerate);
}

.close-btn {
  border: none; background: none; color: var(--blue); font-size: 16px;
  cursor: pointer; border-radius: 50%; width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s var(--material-standard);
  will-change: transform;
}

.close-btn:active {
  transform: scale(0.9);
  background: rgba(62,130,230,0.1);
}

.footer { 
  font-size: 11px; color: #94a3b8; text-align: center; 
  margin-top: auto; padding-top: 16px;
  animation: fadeIn 1s var(--gentle-bounce) 1.5s backwards;
}

@keyframes fadeIn { 
  from{opacity:0;} 
  to{opacity:1;} 
}

/* 粒子效果 - 优化动画曲线 */
.particle {
  position: absolute;
  pointer-events: none;
  opacity: 0.7;
  animation: particleFloat 1.2s var(--ease-out-elastic) forwards;
  will-change: transform, opacity;
  z-index: 1;
}

@keyframes particleFloat {
  0% {
    transform: translate(0, 0) scale(0);
    opacity: 0.7;
  }
  70% {
    transform: translate(var(--tx), var(--ty)) scale(1);
    opacity: 0.5;
  }
  100% {
    transform: translate(var(--tx), var(--ty)) scale(0.5);
    opacity: 0;
  }
}

/* 微交互：按钮按压效果 */
.engine-btn:active,
.search-btn:active {
  transform: scale(0.96);
  transition: all 0.1s var(--material-accelerate);
}

/* 移动端优化 */
@media (max-width: 768px) {
  body { padding: 12px; }
  .card { max-width: 100%; margin-bottom: 14px; }
  .bookmarks-grid {
    grid-template-columns: repeat(auto-fill, minmax(68px, 1fr));
    gap: 10px;
  }
  #enginePopup {
    min-width: 120px;
  }
  .engine-item {
    padding: 10px 14px;
  }
  .easter-egg-popup {
    padding: 24px 20px;
    max-width: 280px;
  }
}

@media (max-width: 480px) {
  body { padding: 10px; }
  .card { margin-bottom: 12px; }
  .bookmarks-grid {
    grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
    gap: 8px;
  }
  .bookmark-icon { width: 48px; height: 48px; }
  .bookmark-icon svg { width: 24px; height: 24px; }

let currentEngine = 0;

// 粒子效果函数
function createParticles(x, y, count = 5) {
  for (let i = 0; i < count; i++) {
    const particle = document.createElement('div');
    particle.classList.add('particle');
    particle.style.left = `${x}px`;
    particle.style.top = `${y}px`;
    particle.style.width = `${Math.random() * 10 + 5}px`;
    particle.style.height = particle.style.width;
    particle.style.background = `hsl(${Math.random() * 60 + 200}, 70%, 60%)`;
    particle.style.borderRadius = '50%';
    
    const angle = Math.random() * Math.PI * 2;
    const distance = Math.random() * 50 + 30;
    const tx = Math.cos(angle) * distance;
    const ty = Math.sin(angle) * distance;
    
    particle.style.setProperty('--tx', `${tx}px`);
    particle.style.setProperty('--ty', `${ty}px`);
    
    document.body.appendChild(particle);
    
    setTimeout(() => {
      if (particle.parentNode) {
        particle.parentNode.removeChild(particle);
      }
    }, 1200);
  }
}

// 工具函数
function animateElement(element, className, duration = 400) {
  element.classList.add(className);
  setTimeout(() => {
    if (element.classList.contains(className)) {
      element.classList.remove(className);
    }
  }, duration);
}

// 优化关闭弹窗函数，添加飞出动画
function closePopup(popup, exitAnimation, enterAnimation, duration = 500) {
  // 应用退出动画
  popup.style.animation = exitAnimation;
  
  // 动画结束后隐藏弹窗
  setTimeout(() => {
    popup.style.display = 'none';
    popup.style.animation = enterAnimation; // 重置为进入动画，以备下次使用
  }, duration);
}

// 初始化书签
function initializeBookmarks() {
  const bc = document.getElementById('bookmarksContainer');
  bc.innerHTML = bookmarks.map(b => {
    const iconContent = typeof b.icon === 'string' && b.icon.startsWith('<svg') 
      ? b.icon 
      : `<span style="font-size: 22px;">${b.icon}</span>`;
    
    return `
      <a href="${b.url}" class="bookmark-item">
        <div class="bookmark-icon">${iconContent}</div>
        <div class="bookmark-label">${b.name}</div>
      </a>
    `;
  }).join('');
}

/* 一言 */
async function fetchSentence(){
  const qt = document.getElementById('quoteText');
  const qa = document.getElementById('quoteAuthor');
  
  // 先淡出当前内容
  qt.style.opacity = 0;
  qt.style.transform = 'translateY(10px)';
  qa.style.opacity = 0;
  qa.style.transform = 'translateY(5px)';
  
  try{
    const r = await fetch('https://v1.hitokoto.cn/');
    const d = await r.json();
    setTimeout(() => {
      qt.textContent = `"${d.hitokoto}"`;
      qa.textContent = d.from ? `—— ${d.from}` : '';
      
      setTimeout(() => {
        qt.style.opacity = 1;
        qt.style.transform = 'translateY(0)';
        qa.style.opacity = 1;
        qa.style.transform = 'translateY(0)';
      }, 50);
    }, 300);
  } catch {
    qt.textContent = '获取一言失败，请检查网络。';
    qa.textContent = '';
    
    setTimeout(() => {
      qt.style.opacity = 1;
      qt.style.transform = 'translateY(0)';
      qa.style.opacity = 1;
      qa.style.transform = 'translateY(0)';
    }, 50);
  }
}

/* 刷新动画 */
const mainIcon = document.getElementById('refreshQuote');
mainIcon.addEventListener('click', (e) => {
  clickCount++;
  
  // 添加粒子效果
  const rect = mainIcon.getBoundingClientRect();
  const x = rect.left + rect.width / 2;
  const y = rect.top + rect.height / 2;
  createParticles(x, y, 8);
  
  if (clickTimer) clearTimeout(clickTimer);
  
  clickTimer = setTimeout(() => {
    clickCount = 0;
  }, EGG_TIMEOUT);
  
  if (clickCount >= EGG_TRIGGER_COUNT) {
    showEasterEgg();
    clickCount = 0;
    return;
  }
  
  animateElement(mainIcon, 'interact');
  fetchSentence();
});

/* 搜索引擎切换动效 */
const engineBtn = document.getElementById('engineBtn');
const engineName = document.getElementById('engineName');
const engineBtnIcon = document.getElementById('engineBtnIcon');
const enginePopup = document.getElementById('enginePopup');

// 添加关闭引擎菜单函数
function closeEnginePopup() {
  if (enginePopup.style.display === 'block') {
    // 添加飞出动画
    enginePopup.style.animation = 'popupSpringOut 0.3s var(--material-accelerate) forwards';
    
    // 动画结束后隐藏
    setTimeout(() => {
      enginePopup.style.display = 'none';
      enginePopup.style.animation = 'popupSpring 0.4s var(--ease-in-out-back) forwards'; // 重置为进入动画
    }, 300);
  }
}

// 初始化搜索引擎按钮图标
function updateEngineIcon() {
  if (typeof engines[currentEngine].icon === 'string' && engines[currentEngine].icon.startsWith('<svg')) {
    engineBtnIcon.innerHTML = engines[currentEngine].icon;
  } else {
    engineBtnIcon.innerHTML = `<span>${engines[currentEngine].icon}</span>`;
  }
  engineName.textContent = engines[currentEngine].name;
}

// 初始化时设置正确的图标和名称
updateEngineIcon();

// 优化引擎按钮点击事件
engineBtn.addEventListener('click', e => {
  e.stopPropagation();
  
  if (enginePopup.style.display === 'block') {
    // 如果已经打开，则关闭
    closeEnginePopup();
  } else {
    // 否则打开菜单
    const rect = engineBtn.getBoundingClientRect();
    enginePopup.style.left = rect.left + 'px';
    enginePopup.style.top = (rect.bottom + 6) + 'px';
    enginePopup.style.display = 'block';
    
    // 生成引擎菜单项
    enginePopup.innerHTML = engines.map((engine, i) => {
      const iconContent = typeof engine.icon === 'string' && engine.icon.startsWith('<svg') 
        ? engine.icon 
        : `<span>${engine.icon}</span>`;
      
      return `
        <div class="engine-item ${i === currentEngine ? 'active' : ''}" data-i="${i}">
          <span class="engine-icon">${iconContent}</span> ${engine.name}
        </div>
      `;
    }).join('');
  }
});

// 优化文档点击事件 - 点击其他地方关闭菜单
document.addEventListener('click', (e) => {
  // 只有当点击的不是引擎按钮或弹出菜单时才关闭
  if (!engineBtn.contains(e.target) && !enginePopup.contains(e.target)) {
    closeEnginePopup();
  }
});

// 优化引擎弹出菜单点击事件
enginePopup.addEventListener('click', e => {
  e.stopPropagation();
  const engineItem = e.target.closest('.engine-item');
  if (engineItem) {
    const idx = parseInt(engineItem.dataset.i);
    if(!isNaN(idx)){
      currentEngine = idx;
      updateEngineIcon();
      
      // 添加粒子效果
      const rect = engineBtn.getBoundingClientRect();
      const x = rect.left + rect.width / 2;
      const y = rect.top + rect.height / 2;
      createParticles(x, y, 4);
      
      // 触发旋转动画
      animateElement(engineBtn, 'animate', 700);
      
      // 添加菜单项点击反馈
      engineItem.style.animation = 'none';
      setTimeout(() => {
        engineItem.style.animation = '';
      }, 10);
      
      // 延迟关闭菜单，让用户看到反馈
      setTimeout(() => {
        closeEnginePopup();
      }, 300);
    }
  }
});

/* 搜索按钮效果 - 优化版本 */
const searchBtn = document.getElementById('searchBtn');
searchBtn.addEventListener('click', e => {
  // 添加涟漪效果
  searchBtn.classList.remove('ripple');
  void searchBtn.offsetWidth; // 重置动画
  searchBtn.classList.add('ripple');
  
  // 添加粒子效果
  const rect = searchBtn.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  createParticles(x + rect.left, y + rect.top, 5);
  
  setTimeout(() => {
    searchBtn.classList.remove('ripple');
  }, 600);
  
  doSearch();
});

function doSearch(){
  const q = document.getElementById('searchInput').value.trim();
  if(!q) return;
  if(q.startsWith('http')) location.href = q;
  else if(q.includes('.') && !q.includes(' ')) location.href = 'https://' + q;
  else location.href = engines[currentEngine].url.replace('{query}', encodeURIComponent(q));
}
document.getElementById('searchInput').addEventListener('keypress', e => { if(e.key === 'Enter') doSearch(); });

// 初始加载
window.onload = () => {
  initializeBookmarks();
  
  // 修改：页面加载时立即从API获取一言
  fetchSentence();
};
